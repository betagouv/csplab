name: Notebook Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/notebook/**"
      - ".github/workflows/notebook_pages.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notebook-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy notebooks to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/notebook
          target-folder: notebook
          force: false
          clean-exclude: |
            storybook
            pr-*
