name: Storybook Pages

on:
  push:
    branches: ["main"]
    paths:
      - "src/web/presentation/frontend/**"
      - ".github/workflows/storybook_pages.yml"
      - ".github/actions/**"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, closed]
    paths:
      - "src/web/presentation/frontend/**"
      - ".github/workflows/storybook_pages.yml"
      - ".github/actions/**"
  delete:
    branches-ignore:
      - main
      - gh-pages
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "Type de déploiement"
        required: true
        default: "branch-preview"
        type: choice
        options:
          - branch-preview
          - main

permissions:
  contents: write
  pull-requests: write
  pages: read

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request' && format('gh-pages-deploy-pr-{0}', github.event.number) ||
      github.event_name == 'workflow_dispatch' && inputs.deploy_type == 'branch-preview' && format('gh-pages-deploy-branch-{0}', github.ref_name) ||
      github.event_name == 'delete' && format('gh-pages-cleanup-branch-{0}', github.event.ref) ||
      'gh-pages-deploy'
    }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.deploy_type == 'branch-preview') }}

jobs:
  deploy-main:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_type == 'main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v5
      - name: Resolve GitHub Pages base path
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const { origin, pathname } = new URL(data.html_url)
            core.setOutput('origin', origin)
            core.setOutput('base', pathname.replace(/\/$/, ''))
      - uses: ./.github/actions/setup-pnpm-node
        with:
          lock-file-path: src/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        env:
          STORYBOOK_BASE_URL: ${{ steps.pages.outputs.base }}/storybook/main/
        run: pnpm --filter csplab-frontend build-storybook
      - name: Prepare root site files
        run: |
          ROOT="${{ runner.temp }}/ghpages-root"
          mkdir -p "$ROOT/storybook"
          touch "$ROOT/.nojekyll"
          cat > "$ROOT/storybook/index.html" <<'HTML'
          <!doctype html>
          <html lang="fr">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./main/" />
              <link rel="canonical" href="./main/" />
              <title>Storybook</title>
            </head>
            <body>
              <p>Redirection vers <a href="./main/">le Storybook</a>…</p>
            </body>
          </html>
          HTML
        working-directory: .
      - name: Deploy root site files
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ${{ runner.temp }}/ghpages-root
          clean: false
          force: false
      - name: Deploy main Storybook
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/web/presentation/frontend/storybook-static
          target-folder: storybook/main
          force: false

  deploy-branch-preview:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_type == 'branch-preview'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v5
      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
        working-directory: .
      - name: Resolve GitHub Pages base path
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const { origin, pathname } = new URL(data.html_url)
            core.setOutput('origin', origin)
            core.setOutput('base', pathname.replace(/\/$/, ''))
      - uses: ./.github/actions/setup-pnpm-node
        with:
          lock-file-path: src/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        env:
          STORYBOOK_BASE_URL: ${{ steps.pages.outputs.base }}/storybook/branch/${{ steps.branch.outputs.name }}/
        run: pnpm --filter csplab-frontend build-storybook
      - name: Deploy branch preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/web/presentation/frontend/storybook-static
          target-folder: storybook/branch/${{ steps.branch.outputs.name }}
          force: false
      - name: Print preview URL
        run: |
          echo "## 📖 Storybook Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${{ steps.pages.outputs.origin }}${{ steps.pages.outputs.base }}/storybook/branch/${{ steps.branch.outputs.name }}/" >> $GITHUB_STEP_SUMMARY
        working-directory: .

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && contains(github.event.pull_request.labels.*.name, 'storybook')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/web
    steps:
      - uses: actions/checkout@v5
      - name: Resolve GitHub Pages base path
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getPages({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const { origin, pathname } = new URL(data.html_url)
            core.setOutput('origin', origin)
            core.setOutput('base', pathname.replace(/\/$/, ''))
      - uses: ./.github/actions/setup-pnpm-node
        with:
          lock-file-path: src/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        env:
          STORYBOOK_BASE_URL: ${{ steps.pages.outputs.base }}/storybook/pr/${{ github.event.number }}/
        run: pnpm --filter csplab-frontend build-storybook
      - name: Deploy PR preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: src/web/presentation/frontend/storybook-static
          target-folder: storybook/pr/${{ github.event.number }}
          force: false
      - uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.pages.outputs.origin }}${{ steps.pages.outputs.base }}/storybook/pr/${{ github.event.number }}/
        with:
          script: |
            const url = process.env.PREVIEW_URL
            const marker = '<!-- storybook-preview -->'
            const body = `${marker}\n📖 Storybook de prévisualisation : ${url}`
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
            })
            const previous = comments.find(comment => comment.body.includes(marker))
            if (previous) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: previous.id, body })
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body })
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages
      - name: Remove preview folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -rf --ignore-unmatch "storybook/pr/${{ github.event.number }}"
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove Storybook preview for PR #${{ github.event.number }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:gh-pages; then exit 0; fi
            git pull --rebase origin gh-pages
          done
          echo "Could not push preview cleanup after 3 attempts" >&2
          exit 1

  cleanup-branch-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages
      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH_NAME="${{ github.event.ref }}"
          SANITIZED=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//' | cut -c1-50)
          echo "name=$SANITIZED" >> $GITHUB_OUTPUT
      - name: Remove branch preview folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FOLDER="storybook/branch/${{ steps.branch.outputs.name }}"
          if [ ! -d "$FOLDER" ]; then
            echo "Folder $FOLDER does not exist, nothing to clean"
            exit 0
          fi
          git rm -rf "$FOLDER"
          git diff --cached --quiet && exit 0
          git commit -m "chore: remove Storybook preview for branch ${{ github.event.ref }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:gh-pages; then exit 0; fi
            git pull --rebase origin gh-pages
          done
          echo "Could not push preview cleanup after 3 attempts" >&2
          exit 1
