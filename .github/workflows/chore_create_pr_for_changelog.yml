name: Generate changelog PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compute the next (shared) version once, from all commits in the repo.
      # All three service changelogs and pyproject.toml files are bumped to this
      # same version (Option A: one shared monorepo version).
      - name: Compute next version
        uses: orhun/git-cliff-action@v4
        id: git_cliff_full
        with:
          config: src/web/cliff.toml
          args: --verbose --bump --unreleased

      # Generate one changelog per service, filtered by file path. `--tag` forces
      # the unreleased section to use the shared version computed above so the
      # three changelogs stay in lockstep instead of bumping independently.
      - name: Generate web changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: src/web/cliff.toml
          args: --verbose --tag ${{ steps.git_cliff_full.outputs.version }} --include-path "src/web/**" --include-path "libs/ddd/**" --include-path "libs/referentiel/**"
        env:
          OUTPUT: src/web/CHANGELOG.md

      - name: Generate ocr changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: src/web/cliff.toml
          args: --verbose --tag ${{ steps.git_cliff_full.outputs.version }} --include-path "src/ocr/**" --include-path "libs/ddd/**" --include-path "libs/referentiel/**"
        env:
          OUTPUT: src/ocr/CHANGELOG.md

      - name: Generate ingestion changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: src/web/cliff.toml
          args: --verbose --tag ${{ steps.git_cliff_full.outputs.version }} --include-path "src/ingestion/**" --include-path "libs/ddd/**" --include-path "libs/referentiel/**"
        env:
          OUTPUT: src/ingestion/CHANGELOG.md

      - name: Generate latest changes
        uses: orhun/git-cliff-action@v4
        id: git_cliff_latest
        with:
          config: src/web/cliff.toml
          args: --verbose --latest --bump --unreleased

      - name: Create Pull Request
        if: steps.git_cliff_full.outputs.version != 'null'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            src/web/CHANGELOG.md
            src/ocr/CHANGELOG.md
            src/ingestion/CHANGELOG.md
            src/web/pyproject.toml
            src/ocr/pyproject.toml
            src/ingestion/pyproject.toml
          base: main
          commit-message: "📝(release) update CHANGELOG.md for ${{ steps.git_cliff_full.outputs.version }}"
          signoff: true
          sign-commits: true
          branch: chore/next-release-changelog
          delete-branch: true
          title: "📝(release): ${{ steps.git_cliff_full.outputs.version }}"
          body: ${{ steps.git_cliff_latest.outputs.content }}
          labels: |
            pending-release
