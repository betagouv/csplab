{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>{{ title }}</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700"
              rel="stylesheet">
        <style nonce="{{ csp_nonce }}">
                body {
                        margin: 0;
                        padding: 0;
                }
        </style>
    </head>
    <body>
        <div id="redoc-container"></div>
        <script src="{% static 'js/redoc.standalone.js' %}" nonce="{{ csp_nonce }}"></script>
        <script nonce="{{ csp_nonce }}">
                Redoc.init("{{ schema_url }}", {nonce: "{{ csp_nonce }}"}, document.getElementById("redoc-container"));
        </script>
    </body>
</html>
