        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/PageParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    format: uri
                    nullable: true
                  previous:
                    type: string
                    format: uri
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/Entity"

  /entities/{entity_code}/:
    get:
      tags: [Entités]
      summary: Détail d'une entité
      parameters:
        - name: entity_code
