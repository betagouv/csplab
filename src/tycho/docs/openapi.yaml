  # ==========================================================================
  # Job Offers
  # ==========================================================================

  /job-offers/:
    get:
      tags: [Offres d'emploi]
      summary: Liste des offres d'emploi
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderingParam"
        - name: is_published
          in: query
          schema:
            type: boolean
          example: true
        - name: entity__entity_code
          in: query
          schema:
            type: string
          example: "1"
        - name: versant__code
          in: query
          schema:
            type: string
          example: "FPE"
        - name: contract__code
          in: query
          schema:
            type: string
          example: "NAT_TITULAIRE_CONTRACTUEL"
        - name: categories__code
          in: query
          description: "Filtrer par code catégorie (un seul code, répétable)"
          schema:
            type: string
          example: "CAT-A"
        - name: domain__code
          in: query
          schema:
            type: string
          example: "ERNUM"
        - name: addresses__department__code
          in: query
          schema:
            type: string
          example: "75"
        - name: addresses__region__code
          in: query
          schema:
            type: string
          example: "R11"
        - name: experience_level__code
          in: query
          schema:
            type: string
          example: "confirme"
        - name: education_level__code
          in: query
          schema:
            type: string
          example: "G"
        - name: position_status__code
          in: query
          schema:
            type: string
            enum: [STATUT01, STATUT02]
        - name: is_full_time
          in: query
          schema:
            type: boolean
        - name: remote_work
          in: query
          schema:
            type: boolean
        - name: has_management
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedJobOffers"

    post:
      tags: [Offres d'emploi]
      summary: Créer une offre d'emploi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOfferWrite"
            example:
              reference: "2025-MIN-0042"
              job_title: "Ingénieur systèmes d'information"
              entity: "1"
              categories: ["CAT-A"]
              domain: "ERNUM"
              job: "ERNUM001"
              contract: "NAT_TITULAIRE_CONTRACTUEL"
              contract_nature: "CDI"
              versant: "FPE"
              is_full_time: true
              remote_work: true
              has_management: false
              education_level: "G"
              experience_level: "confirme"
              position_status: "STATUT01"
              number_of_vacancies: 1
              beginning_date: "2025-09-01"
              is_published: false
              publication_start: "2025-06-01"
              publication_end: "2025-07-15"
              languages:
                - language: "FR"
                  level: "C1"
                - language: "EN"
                  level: "B2"
              addresses:
                - street: "20 avenue de Ségur"
                  city: "Paris"
                  postal_code: "75007"
                  department: "75"
                  region: "R11"
                  country: "FRA"
                  latitude: 48.8497
                  longitude: 2.308
                  geocoding_source: "ban"
                  geocoding_score: 0.97
                  is_primary: true
      responses:
        "201":
          description: Offre créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOfferRead"
        "400":
          $ref: "#/components/responses/ValidationError"

  /job-offers/{id}/:
    get:
      tags: [Offres d'emploi]
      summary: Détail d'une offre d'emploi
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOfferRead"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Offres d'emploi]
      summary: Remplacement complet d'une offre
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOfferWrite"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOfferRead"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Offres d'emploi]
      summary: Mise à jour partielle d'une offre
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOfferWrite"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOfferRead"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Offres d'emploi]
      summary: Supprimer une offre
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Supprimé
        "404":
          $ref: "#/components/responses/NotFound"

  /job-offers/{id}/publish/:
    post:
      tags: [Offres d'emploi]
      summary: Publier une offre
      description: "Passe `is_published` à `true`."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offre publiée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /job-offers/{id}/unpublish/:
    post:
      tags: [Offres d'emploi]
      summary: Dépublier une offre
      description: "Passe `is_published` à `false`."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offre dépubliée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "404":
          $ref: "#/components/responses/NotFound"

# ---------------------------------------------------------------------------
# Tags (for display order in Swagger UI)
# ---------------------------------------------------------------------------
tags:
  - name: Authentification
    description: >-
      Obtenir et rafraîchir les tokens JWT (simplejwt).
      Les routes /token/ sont publiques — toutes les autres requièrent un Bearer token.
  - name: Offres d'emploi
    description: CRUD des offres d'emploi + actions publish/unpublish
  - name: Adresses
    description: Gestion des adresses géocodées (lieux de travail)
  - name: Entités
    description: Organismes de rattachement (arbre hiérarchique TalentSoft)
  - name: Référentiels
    description: Tables de codes paramétrables (lecture seule)
  - name: Référentiels — Localisation
    description: Pays, régions, départements
