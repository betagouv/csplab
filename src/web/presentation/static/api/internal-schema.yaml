    Localisation:
      type: object
      properties:
        zone_geographique:
          $ref: '#/components/schemas/ZoneGeographiqueEnum'
        pays:
          type: string
          maxLength: 3
          minLength: 3
        region:
          oneOf:
          - $ref: '#/components/schemas/RegionEnum'
          - $ref: '#/components/schemas/BlankEnum'
        departement:
          oneOf:
          - $ref: '#/components/schemas/DepartementEnum'
          - $ref: '#/components/schemas/BlankEnum'
        localisation_label:
          type: string
          maxLength: 500
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
      required:
      - departement
      - latitude
      - localisation_label
      - longitude
      - pays
      - region
      - zone_geographique
    Note:
