openapi: 3.0.3
info:
  title: CSPLab Internal API
  version: 0.0.1
paths:
  /recruteur/organisme/{organisme_uuid}/:
    get:
      operationId: recruteur_organisme_retrieve
      summary: Detail d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisme'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/parametres/etapes/:
    get:
      operationId: recruteur_organisme_parametres_etapes_list
      summary: Liste des étapes de recrutement d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
    put:
      operationId: recruteur_organisme_parametres_etapes_update
      summary: Modifier les étapes de recrutement d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/parametres/etapes/init/:
    post:
      operationId: recruteur_organisme_parametres_etapes_init_create
      summary: Initialiser les étapes de recrutement par défaut d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements/:
    get:
      operationId: recruteur_organisme_recrutements_retrieve
      description: 'Retourne la liste paginée des recrutements d''un organisme. Deux
        onglets disponibles via le paramètre `filtre` : `actifs` (recrutements en
        cours, défaut) et `archives` (offres archivées).'
      summary: Liste des recrutements d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecrutementActifPage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements/{recrutement_uuid}/kanban/:
    get:
      operationId: recruteur_organisme_recrutements_kanban_retrieve
      summary: Détail d'un recrutement — vue kanban
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: recrutement_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecrutementDetailKanban'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements/{recrutement_uuid}/liste/:
    get:
      operationId: recruteur_organisme_recrutements_liste_retrieve
      summary: Détail d'un recrutement — vue liste (paginée)
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: recrutement_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecrutementDetailListePage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /utilisateur/me:
    get:
      operationId: utilisateur_me_retrieve
      summary: Detail de l'utilisateur connecté
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Utilisateur'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
components:
  schemas:
    AreaEnum:
      enum:
      - AF
      - EU
      - AS
      - AM
      - OC
      - AN
      type: string
      description: |-
        * `AF` - AFRIQUE
        * `EU` - EUROPE
        * `AS` - ASIE
        * `AM` - AMERIQUE
        * `OC` - OCEANIE
        * `AN` - ANTARTIQUE
    Candidat:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        nom:
          type: string
        prenom:
          type: string
      required:
      - nom
      - prenom
      - uuid
    Candidature:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        date_soumission:
          type: string
          format: date-time
        candidat:
          $ref: '#/components/schemas/Candidat'
      required:
      - candidat
      - date_soumission
      - uuid
    CandidatureListe:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        date_soumission:
          type: string
          format: date-time
        candidat:
          $ref: '#/components/schemas/Candidat'
        etape:
          $ref: '#/components/schemas/EtapeRecrutementDetail'
      required:
      - candidat
      - date_soumission
      - etape
      - uuid
    CandidaturesActives:
      type: object
      properties:
        total:
          type: integer
          nullable: true
        a_traiter:
          type: integer
          nullable: true
        en_cours:
          type: integer
          nullable: true
      required:
      - a_traiter
      - en_cours
      - total
    CategorieEnum:
      enum:
      - ENTREE
      - EN_COURS
      - REFUS
      - ACCEPTE
      type: string
      description: |-
        * `ENTREE` - entree
        * `EN_COURS` - en_cours
        * `REFUS` - refus
        * `ACCEPTE` - accepte
    CategorieOffreEnum:
      enum:
      - APLUS
      - A
      - B
      - C
      - HORS_CATEGORIE
      type: string
      description: |-
        * `APLUS` - APLUS
        * `A` - A
        * `B` - B
        * `C` - C
        * `HORS_CATEGORIE` - HORS_CATEGORIE
    EtapeRecrutement:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
      required:
      - categorie
      - etape_uuid
      - nom
    EtapeRecrutementDetail:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
      required:
      - categorie
      - etape_uuid
      - nom
    EtapeRecrutementDetailedCandidatures:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
        candidatures:
          type: array
          items:
            $ref: '#/components/schemas/Candidature'
      required:
      - candidatures
      - categorie
      - etape_uuid
      - nom
    GenericError:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    KindContratEnum:
      enum:
      - CDD
      - CDI
      - PERMANENT
      - VACATION
      - STAGE
      type: string
      description: |-
        * `CDD` - CDD
        * `CDI` - CDI
        * `PERMANENT` - Permanent
        * `VACATION` - Vacation
        * `STAGE` - Stage
    Localisation:
      type: object
      properties:
        area:
          $ref: '#/components/schemas/AreaEnum'
        country:
          type: string
          description: 'Code ISO Alpha-3 du pays (ex: FRA)'
        region:
          type: string
          description: 'Code INSEE de la région (ex: 11)'
        department:
          type: string
          description: 'Code INSEE du département (ex: 75)'
        label:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
      required:
      - area
      - country
      - department
      - region
    NullEnum:
      enum:
      - null
    Organisme:
      type: object
      properties:
        nom:
          type: string
        siret:
          type: string
      required:
      - nom
      - siret
    OrganismeRecruteur:
      type: object
      properties:
        nom:
          type: string
        siret:
          type: string
      required:
      - nom
      - siret
    RecrutementActif:
      type: object
      properties:
        offer_id:
          type: string
          format: uuid
        intitule:
          type: string
        reference_csp:
          type: string
        type_contrat:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/TypeContratEnum'
          - $ref: '#/components/schemas/NullEnum'
        kind_contrat:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/KindContratEnum'
          - $ref: '#/components/schemas/NullEnum'
        date_publication:
          type: string
          format: date-time
        responsables:
          type: array
          items:
            $ref: '#/components/schemas/Responsable'
        derniere_activite:
          type: string
          format: date-time
        candidatures:
          allOf:
          - $ref: '#/components/schemas/CandidaturesActives'
          nullable: true
      required:
      - candidatures
      - date_publication
      - derniere_activite
      - intitule
      - kind_contrat
      - offer_id
      - reference_csp
      - responsables
      - type_contrat
    RecrutementActifPage:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/RecrutementActif'
      required:
      - count
      - next
      - previous
      - results
    RecrutementDetailKanban:
      type: object
      properties:
        offer_id:
          type: string
          format: uuid
        intitule:
          type: string
        date_publication:
          type: string
          format: date-time
        localisation:
          $ref: '#/components/schemas/Localisation'
        organisme_recruteur:
          $ref: '#/components/schemas/OrganismeRecruteur'
        categorie_offre:
          $ref: '#/components/schemas/CategorieOffreEnum'
        etapes:
          type: array
          items:
            $ref: '#/components/schemas/EtapeRecrutementDetailedCandidatures'
      required:
      - categorie_offre
      - date_publication
      - etapes
      - intitule
      - localisation
      - offer_id
      - organisme_recruteur
    RecrutementDetailListePage:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/CandidatureListe'
      required:
      - count
      - next
      - previous
      - results
    Responsable:
      type: object
      properties:
        nom:
          type: string
      required:
      - nom
    TokenError:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TokenErrorMessage'
      required:
      - code
      - detail
      - messages
    TokenErrorMessage:
      type: object
      properties:
        token_class:
          type: string
        token_type:
          type: string
        message:
          type: string
      required:
      - message
      - token_class
      - token_type
    TypeContratEnum:
      enum:
      - TITULAIRE_CONTRACTUEL
      - CONTRACTUELS
      - TERRITORIAL
      type: string
      description: |-
        * `TITULAIRE_CONTRACTUEL` - TITULAIRE_CONTRACTUEL
        * `CONTRACTUELS` - CONTRACTUELS
        * `TERRITORIAL` - TERRITORIAL
    UpdateEtapeRecrutement:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
      required:
      - categorie
      - nom
    Utilisateur:
      type: object
      properties:
        email:
          type: string
          format: email
        prenom:
          type: string
        nom:
          type: string
      required:
      - email
      - nom
      - prenom
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: utilisateurs
  description: Gestion des utilisateurs
