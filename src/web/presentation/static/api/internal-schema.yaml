openapi: 3.0.3
info:
  title: CSPLab Internal API
  version: 0.0.1
paths:
  /utilisateur/me/:
    get:
      operationId: utilisateur_me_retrieve
      summary: Detail de l'utilisateur connecté
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Utilisateur'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
components:
  schemas:
    GenericError:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    TokenError:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/TokenErrorMessage'
      required:
      - code
      - detail
      - messages
    TokenErrorMessage:
      type: object
      properties:
        token_class:
          type: string
        token_type:
          type: string
        message:
          type: string
      required:
      - message
      - token_class
      - token_type
    Utilisateur:
      type: object
      properties:
        email:
          type: string
          format: email
        prenom:
          type: string
        nom:
          type: string
      required:
      - email
      - nom
      - prenom
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: utilisateurs
  description: Gestion des utilisateurs
