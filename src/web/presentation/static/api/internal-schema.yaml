    EtapeRecrutement:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
      required:
      - categorie
      - etape_uuid
      - nom
    EtapeRecrutementDetailedCandidatures:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: '#/components/schemas/CategorieEnum'
        candidatures:
          type: array
          items:
            $ref: '#/components/schemas/Candidature'
      required:
      - candidatures
      - categorie
      - etape_uuid
      - nom
    GenericError:
      type: object
      properties:
        error:
          type: string
      required:
