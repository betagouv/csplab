openapi: 3.0.3
info:
  title: CSPLab Internal API
  version: 0.0.1
paths:
  /recruteur/candidature/{candidature_uuid}/notes:
    get:
      operationId: recruteur_candidature_notes_list
      summary: Liste des notes d'une candidature
      parameters:
      - in: path
        name: candidature_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
    post:
      operationId: recruteur_candidature_notes_create
      summary: Ajouter une note à une candidature
      parameters:
      - in: path
        name: candidature_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreerNote'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreerNote'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreerNote'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/candidature/{candidature_uuid}/notes/{note_uuid}:
    patch:
      operationId: recruteur_candidature_notes_partial_update
      summary: Modifier une note d'une candidature
      parameters:
      - in: path
        name: candidature_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: note_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEditerNote'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEditerNote'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEditerNote'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
    delete:
      operationId: recruteur_candidature_notes_destroy
      summary: Supprimer une note d'une candidature
      parameters:
      - in: path
        name: candidature_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: note_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}:
    get:
      operationId: recruteur_organisme_retrieve
      summary: Detail d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organisme'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/parametres/etapes:
    get:
      operationId: recruteur_organisme_parametres_etapes_list
      summary: Liste des étapes de recrutement d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
    put:
      operationId: recruteur_organisme_parametres_etapes_update
      summary: Modifier les étapes de recrutement d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateEtapeRecrutement'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/parametres/etapes/init:
    post:
      operationId: recruteur_organisme_parametres_etapes_init_create
      summary: Initialiser les étapes de recrutement par défaut d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EtapeRecrutement'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements-actifs:
    get:
      operationId: recruteur_organisme_recrutements_actifs_list
      description: 'Retourne la liste paginée des recrutements d''un organisme. '
      summary: Liste des recrutements actifs d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecrutementsActifsList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
