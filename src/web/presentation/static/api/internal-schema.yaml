          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements-archives:
    get:
      operationId: recruteur_organisme_recrutements_archives_list
      description: 'Retourne la liste paginée des recrutements archivés d''un organisme. '
      summary: Liste des recrutements archivés d'un organisme
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecrutementsArchivesList'
          description: ''
        '400':
          content:
            application/json:
              schema:
