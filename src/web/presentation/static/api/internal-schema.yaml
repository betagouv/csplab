openapi: 3.0.3
info:
  title: CSPLab Internal API
  version: 0.0.1
paths:
  /recruteur/organisme/{organisme_uuid}:
    get:
      operationId: recruteur_organisme_retrieve
      summary: Detail d'un organisme
      parameters:
        - in: path
          name: organisme_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - recruteur
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organisme"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
  /recruteur/organisme/{organisme_uuid}/parametres/etapes:
    get:
      operationId: recruteur_organisme_parametres_etapes_list
      summary: Liste des étapes de recrutement d'un organisme
      parameters:
        - in: path
          name: organisme_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - recruteur
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EtapeRecrutement"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
    put:
      operationId: recruteur_organisme_parametres_etapes_update
      summary: Modifier les étapes de recrutement d'un organisme
      parameters:
        - in: path
          name: organisme_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - recruteur
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateEtapeRecrutement"
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateEtapeRecrutement"
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateEtapeRecrutement"
        required: true
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EtapeRecrutement"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
  /recruteur/organisme/{organisme_uuid}/parametres/etapes/init:
    post:
      operationId: recruteur_organisme_parametres_etapes_init_create
      summary: Initialiser les étapes de recrutement par défaut d'un organisme
      parameters:
        - in: path
          name: organisme_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - recruteur
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "201":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EtapeRecrutement"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
  /recruteur/organisme/{organisme_uuid}/recrutements/:
    get:
      operationId: recruteur_organisme_recrutements_retrieve
      description:
        "Retourne la liste paginée des recrutements d'un organisme. Deux
        onglets disponibles via le paramètre `filtre` : `actifs` (recrutements en
        cours, défaut) et `archives` (offres archivées)."
      summary: Liste des recrutements d'un organisme
      parameters:
        - in: path
          name: organisme_uuid
          schema:
            type: string
            format: uuid
          required: true
      tags:
        - recruteur
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecrutementActifPage"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
  /utilisateur/me:
    get:
      operationId: utilisateur_me_retrieve
      summary: Detail de l'utilisateur connecté
      tags:
        - utilisateurs
      security:
        - jwtAuth: []
        - cookieAuth: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Utilisateur"
          description: ""
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
          description: ""
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
          description: ""
components:
  schemas:
    CandidaturesActives:
      type: object
      properties:
        total:
          type: integer
          nullable: true
        a_traiter:
          type: integer
          nullable: true
        en_cours:
          type: integer
          nullable: true
      required:
        - a_traiter
        - en_cours
        - total
    CategorieEnum:
      enum:
        - ENTREE
        - EN_COURS
        - TERMINALE
      type: string
      description: |-
        * `ENTREE` - entree
        * `EN_COURS` - en_cours
        * `TERMINALE` - terminale
    EtapeRecrutement:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: "#/components/schemas/CategorieEnum"
      required:
        - categorie
        - etape_uuid
        - nom
    GenericError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    KindContratEnum:
      enum:
        - CDD
        - CDI
        - PERMANENT
        - VACATION
        - STAGE
      type: string
      description: |-
        * `CDD` - CDD
        * `CDI` - CDI
        * `PERMANENT` - Permanent
        * `VACATION` - Vacation
        * `STAGE` - Stage
    NullEnum:
      enum:
        - null
    Organisme:
      type: object
      properties:
        nom:
          type: string
        siret:
          type: string
      required:
        - nom
        - siret
    RecrutementActif:
      type: object
      properties:
        offer_id:
          type: string
          format: uuid
        intitule:
          type: string
        reference_csp:
          type: string
        type_contrat:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/TypeContratEnum"
            - $ref: "#/components/schemas/NullEnum"
        kind_contrat:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/KindContratEnum"
            - $ref: "#/components/schemas/NullEnum"
        date_publication:
          type: string
          format: date-time
        responsables:
          type: array
          items:
            $ref: "#/components/schemas/Responsable"
        derniere_activite:
          type: string
          format: date-time
        candidatures:
          allOf:
            - $ref: "#/components/schemas/CandidaturesActives"
          nullable: true
      required:
        - candidatures
        - date_publication
        - derniere_activite
        - intitule
        - kind_contrat
        - offer_id
        - reference_csp
        - responsables
        - type_contrat
    RecrutementActifPage:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          format: uri
          nullable: true
        previous:
          type: string
          format: uri
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/RecrutementActif"
      required:
        - count
        - next
        - previous
        - results
    Responsable:
      type: object
      properties:
        nom:
          type: string
      required:
        - nom
    TokenError:
      type: object
      properties:
        detail:
          type: string
        code:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/TokenErrorMessage"
      required:
        - code
        - detail
        - messages
    TokenErrorMessage:
      type: object
      properties:
        token_class:
          type: string
        token_type:
          type: string
        message:
          type: string
      required:
        - message
        - token_class
        - token_type
    TypeContratEnum:
      enum:
        - TITULAIRE_CONTRACTUEL
        - CONTRACTUELS
        - TERRITORIAL
      type: string
      description: |-
        * `TITULAIRE_CONTRACTUEL` - TITULAIRE_CONTRACTUEL
        * `CONTRACTUELS` - CONTRACTUELS
        * `TERRITORIAL` - TERRITORIAL
    UpdateEtapeRecrutement:
      type: object
      properties:
        etape_uuid:
          type: string
          format: uuid
        nom:
          type: string
        categorie:
          $ref: "#/components/schemas/CategorieEnum"
      required:
        - categorie
        - nom
    Utilisateur:
      type: object
      properties:
        email:
          type: string
          format: email
        prenom:
          type: string
        nom:
          type: string
      required:
        - email
        - nom
        - prenom
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: utilisateurs
    description: Gestion des utilisateurs
