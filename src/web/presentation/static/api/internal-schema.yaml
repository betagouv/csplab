  /recruteur/organisme/{organisme_uuid}/recrutements/{recrutement_uuid}/kanban:
    get:
      operationId: recruteur_organisme_recrutements_kanban_retrieve
      summary: Détail d'un recrutement — vue kanban
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: recrutement_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecrutementDetailKanban'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /recruteur/organisme/{organisme_uuid}/recrutements/{recrutement_uuid}/liste:
    get:
      operationId: recruteur_organisme_recrutements_liste_list
      summary: Détail d'un recrutement — vue liste (paginée)
      parameters:
      - in: path
        name: organisme_uuid
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: recrutement_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - recruteur
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCandidatureListeList'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
  /utilisateur/me:
    get:
      operationId: utilisateur_me_retrieve
      summary: Detail de l'utilisateur connecté
      tags:
      - utilisateurs
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Utilisateur'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
components:
  schemas:
    BlankEnum:
      enum:
      - ''
    Candidat:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        nom:
          type: string
        prenom:
          type: string
      required:
      - nom
      - prenom
      - uuid
    Candidature:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        date_soumission:
          type: string
          format: date-time
        date_derniere_activite:
          type: string
          format: date-time
        candidat:
          $ref: '#/components/schemas/Candidat'
      required:
      - candidat
      - date_derniere_activite
      - date_soumission
      - uuid
    CandidatureListe:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        date_soumission:
          type: string
          format: date-time
        candidat:
          $ref: '#/components/schemas/Candidat'
        date_derniere_activite:
          type: string
          format: date-time
        etape:
          $ref: '#/components/schemas/EtapeRecrutement'
      required:
      - candidat
      - date_derniere_activite
      - date_soumission
      - etape
      - uuid
    CandidaturesActives:
      type: object
      properties:
        total:
          type: integer
          nullable: true
        a_traiter:
          type: integer
          nullable: true
        en_cours:
          type: integer
          nullable: true
      required:
      - a_traiter
      - en_cours
      - total
    CategorieEnum:
      enum:
      - ENTREE
      - EN_COURS
      - REFUS
      - ACCEPTE
      type: string
      description: |-
        * `ENTREE` - entree
        * `EN_COURS` - en_cours
        * `REFUS` - refus
        * `ACCEPTE` - accepte
    CategorieOffreEnum:
      enum:
      - APLUS
      - A
      - B
      - C
      - HORS_CATEGORIE
      type: string
      description: |-
        * `APLUS` - APLUS
        * `A` - A
        * `B` - B
        * `C` - C
        * `HORS_CATEGORIE` - HORS_CATEGORIE
