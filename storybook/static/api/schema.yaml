          type: string
          maxLength: 1500
        bases_legales:
          type: string
          maxLength: 1500
        note_ouverture_poste_url:
          type: string
          format: uri
      required:
      - lieu_de_travail
      - management
      - ouvert_aux_militaires
      - temps_travail
    ContactsInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    CriteriaInput:
      type: object
      properties:
        diplome_niveau:
          type: integer
          maximum: 8
          minimum: 1
        experience:
          $ref: '#/components/schemas/ExperienceEnum'
