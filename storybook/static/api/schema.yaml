        detail:
          type: string
      required:
      - detail
    ArchiveOfferRequest:
      type: object
      properties:
        reference:
          type: string
        source_id:
          type: string
          format: uuid
      required:
      - reference
      - source_id
    ArchiveOfferSuccess:
      type: object
      properties:
