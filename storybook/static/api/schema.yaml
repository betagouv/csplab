openapi: 3.0.3
info:
  title: CSPLab API
  version: 0.0.1
  description: API for CSPLab
paths:
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/concours/upload/:
    post:
      operationId: v1_concours_upload_create
      description: |-
        Permet d'uploader un fichier CSV contenant des données de concours GRECO afin de les importer dans le système.

        **Format attendu :**
        - Encodage : UTF-8
        - Séparateur : point-virgule (`;`)

        **Colonnes obligatoires :**
        - `N° NOR` — identifiant unique de l'arrêté (utilisé comme clé d'upsert)
        - `Corps`
        - `Grade`
        - `Ministère`

        **Traitement :**
        - Validation ligne par ligne selon le schéma `ConcoursRowSchema`
        - Les lignes valides sont créées ou mises à jour (upsert par `N° NOR`)
        - Les lignes invalides sont ignorées et remontées dans `validation_errors`

        **Codes de retour :**
        - `201 Created` — au moins une ligne valide a été traitée avec succès
        - `400 Bad Request` — fichier absent, format invalide, ou aucune ligne valide
        - `401 Unauthorized` — token JWT manquant ou invalide
        - `500 Internal Server Error` — erreur inattendue côté serveur

        **Authentification :** Token JWT requis.
      summary: Upload et traitement d'un fichier CSV de concours GRECO
      tags:
      - concours
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Fichier CSV contenant les données de concours
              required:
              - file
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcoursUploadResponse'
              examples:
                Success-FullImport:
                  value:
                    status: success
                    message: Successfully processed 5185 valid concours records
                    total_rows: 5185
                    valid_rows: 5185
                    invalid_rows: 0
                    created: 5185
                    updated: 0
                    validation_errors: null
                  summary: Toutes les lignes sont valides
                  description: Aucune erreur de validation, toutes les lignes ont
                    été importées.
                Success-PartialImportWithErrors:
                  value:
                    status: success
                    message: Successfully processed 5162 valid concours records
                    total_rows: 5185
                    valid_rows: 5162
                    invalid_rows: 23
                    created: 5100
                    updated: 62
                    validation_errors:
                    - row: 4
                      error: Le champ 'Corps' est requis
                    - row: 17
                      error: Le champ 'Grade' est requis
                    - row: 156
                      error: Le champ 'date_ouverture' doit être au format JJ/MM/AAAA
                  summary: Import partiel avec des lignes invalides
                  description: Certaines lignes ont échoué la validation mais les
                    lignes valides ont quand même été persistées. Le champ `validation_errors`
                    détaille chaque ligne rejetée.
                Success-UpdateOnly:
                  value:
                    status: success
                    message: Successfully processed 120 valid concours records
                    total_rows: 120
                    valid_rows: 120
                    invalid_rows: 0
                    created: 0
                    updated: 120
                    validation_errors: null
                  summary: Mise à jour de concours existants
                  description: Toutes les lignes correspondent à des enregistrements
                    existants
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcoursUpload400Error'
              examples:
                Error-NoFileProvided:
                  value:
                    error: No file provided
                  summary: Aucun fichier dans la requête
                  description: Le champ `file` est absent du corps de la requête multipart.
                Error-WrongFileType:
                  value:
                    error: File must be a CSV
                  summary: Fichier non CSV
                  description: Le fichier uploadé n'a pas l'extension `.csv`.
                Error-NoValidRows:
                  value:
                    error: No valid rows found
                    validation_errors:
                    - row: 1
                      error: Le champ 'N° NOR' est requis
                    - row: 2
                      error: Le champ 'Corps' est requis
                    - row: 3
                      error: Le champ 'Grade' doit être >= 1
                  summary: Aucune ligne valide après validation
                  description: Toutes les lignes ont échoué la validation. Aucune
                    donnée n'a été persistée.
                Error-MalformedCSV:
                  value:
                    error: CSV parsing error
                  summary: Fichier CSV mal formé
                  description: Le fichier ne peut pas être parsé,vérifiez le séparateur
                    (`;`) et l'encodage (UTF-8).
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
              examples:
                Error-InvalidToken:
                  value:
                    detail: Le jeton fourni n'est pas valide.
                    code: token_not_valid
                    messages:
                    - token_class: AccessToken
                      token_type: access
                      message: Token is invalid or expired
                  summary: Token JWT invalide ou expiré
                  description: Le token dans le header `Authorization` est invalide
                    ou expiré.
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                Error-UnexpectedServerError:
                  value:
                    error: Unexpected error
                  summary: Erreur serveur inattendue
                  description: Une erreur inattendue s'est produite côté serveur.
          description: ''
  /api/v1/metiers/:
    get:
      operationId: v1_metiers_retrieve
      description: |2

        # API de consultation des métiers de la Fonction Publique

        Cette API retourne la liste paginée des métiers. Les métiers peuvent être filtrés
        selon leur code de domaine fonctionnel (`domain`).


        Cette API est à l'usage exclusif des personnes autorisées.

        # Permissions

        L'utilisation de cette API nécessite un token d'autorisation spécifique à chaque
        utilisateur.

        # Limitations

        L'interrogation de cette API est limitée à 120 appels par minute et par utilisateur.
      summary: Liste des métiers
      parameters:
      - in: query
        name: domain
        schema:
          type: string
          maxLength: 3
          minLength: 1
      tags:
      - metiers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMetiersResponse'
              examples:
                Success-All:
                  value:
                    libelle: Cheffe / Chef de projet politique de la ville
                    description: Mettre en oeuvre les orientations stratégiques en
                      matièrede développement social et de redynamisation des espaces
                      urbains desQuartiers Politique de la Ville
                    domaine_fonctionnel_code: AMT
                    versants:
                    - FPT
                    activites:
                    - Animer et participer aux instances techniques etde pilotage
                      de la politique de la ville
                    - Instruire les programmations d'actions :suivi administratif,
                      financier et opérationnel
                    - Assurer un rôle de conseil et d'information auprèsdes différents
                      interlocuteurs
                    conditions_particulieres: []
                    offer_family_code: ERAMT001
                  summary: Liste de tous les métiers
                  description: Les métiers sont retournés paginés
                Success-Filtered:
                  value:
                    libelle: Personne ressource en santé et protection animales
                    description: Mobilise sa compétence dans la gestion et le suivi
                      de la santé et dela protection animale en appui aux services
                      territoriaux de l'État
                    domaine_fonctionnel_code: AGR
                    versants:
                    - FPE
                    activites:
                    - Mettre en oeuvre la compétence technique et scientifique dansson
                      domaine de compétence par un appui ponctuel à un servicedépartemental
                      confronté à une situation particulière
                    - Apporter un appui dans l'élaboration des normes,des instructions
                      et des méthodes d'inspection
                    conditions_particulieres:
                    - Déplacements nationaux et internationaux
                    offer_family_code: ERAGR001
                  summary: Liste des métiers correspondants à un code domaine fonctionnel
                  description: Les métiers possédant ce code domaine fonctionnel sont
                    retournés paginés
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                Error-MalformedPayload:
                  value:
                    error: string
                  summary: Données invalides
                  description: Les données passées dans le payload sont incorrectes
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
              examples:
                Error-InvalidToken:
                  value:
                    detail: Le jeton fourni n'est pas valide.
                    code: token_not_valid
                    messages:
                    - token_class: AccessToken
                      token_type: access
                      message: Token is invalid or expired
                  summary: Token JWT invalide ou expiré
                  description: Le token dans le header `Authorization` est invalide
                    ou expiré.
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                Error-UnexpectedServerError:
                  value:
                    error: Unexpected error
                  summary: Erreur serveur inattendue
                  description: Une erreur inattendue s'est produite côté serveur.
          description: ''
  /api/v1/offres/:
    get:
      operationId: v1_offres_retrieve
      description: |2

        # API de consultation des offres d'emploi de la Fonction Publique

        Cette API retourne la liste des offres correspondant à une recherche selon les 2
        critères suivants :

        - Candidature active / archivée
        - Référence externe de la candidature contient une chaîne de caractère spécifique


        Cette API est à l'usage exclusif des personnes autorisées.

        # Permissions

        L'utilisation de cette API nécessite un token d'autorisation spécifique à chaque
        utilisateur.

        # Limitations

        L'interrogation de cette API est limitée à 120 appels par minute et par utilisateur.
      summary: Liste des offres
      tags:
      - offres
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOffersResponse'
              examples:
                Success-ActiveOffers:
                  value:
                    external_id: Versant_FPE-2026-999999
                    title: Responsable de la Division des Affaires Financières H/F
                    organization: Ecole Nationale Supérieure de Techniques Avancées
                      (ENSTA)
                    contract_type: TITULAIRE_CONTRACTUEL
                    category: A
                    publication_date: '2026-04-17T14:44:49.873000+00:00'
                    offer_url: https://test.com/offre-emploi/2026-999999/
                    archived_at: null
                  summary: Liste des offres d'emploi actives
                  description: Les offres d'emploi sans date d'archivage sont retournées
                    paginées
                Success-ArchivedOffers:
                  value:
                    external_id: Versant_FPE-2026-999999
                    title: Responsable de la Division des Affaires Financières H/F
                    organization: Ecole Nationale Supérieure de Techniques Avancées
                      (ENSTA)
                    contract_type: TITULAIRE_CONTRACTUEL
                    category: A
                    publication_date: '2026-04-17T14:44:49.873000+00:00'
                    offer_url: https://test.com/offre-emploi/2026-999999/
                    archived_at: '2026-05-17T12:42:42.873000+00:00'
                  summary: Liste des offres d'emploi archivées
                  description: Les offres d'emploi avec une date d'archivage sont
                    retournées paginées
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
              examples:
                Error-InvalidToken:
                  value:
                    detail: Le jeton fourni n'est pas valide.
                    code: token_not_valid
                    messages:
                    - token_class: AccessToken
                      token_type: access
                      message: Token is invalid or expired
                  summary: Token JWT invalide ou expiré
                  description: Le token dans le header `Authorization` est invalide
                    ou expiré.
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
              examples:
                Error-UnexpectedServerError:
                  value:
                    error: Unexpected error
                  summary: Erreur serveur inattendue
                  description: Une erreur inattendue s'est produite côté serveur.
          description: ''
  /api/v1/offres/archiver:
    post:
      operationId: v1_offres_archiver_create
      description: |-
        Archive une offre selon sa référence et l'identifiant de la source.

        **Corps de la requête :**
        - `reference` — référence de l'offre à archiver (ex. `2026-999999`)
        - `source_id` — identifiant de la source ayant émis la demande (ex. identifiant de l'instance Talentsoft)

        **Codes de retour :**
        - `200 OK` — l'offre a été archivée avec succès
        - `400 Bad Request` — corps de la requête invalide ou champ manquant
        - `401 Unauthorized` — authentification manquante ou invalide
        - `404 Not Found` — aucune offre trouvée pour cette référence

        **Authentification :** Token JWT ou clé d'API requis.
      summary: Archiver une offre par référence
      tags:
      - offres
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveOfferRequest'
            examples:
              Success:
                value:
                  reference: 2026-999999
                  source_id: 12345678-1234-4234-b234-123456789abc
                summary: Offre archivée avec succès
                description: L'offre correspondant à la référence a été archivée.
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveOfferSuccess'
              examples:
                Success:
                  value:
                    status: ok
                  summary: Offre archivée avec succès
                  description: L'offre correspondant à la référence a été archivée.
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveOfferBadRequest'
              examples:
                Error-MissingField:
                  value:
                    reference:
                    - This field is required.
                  summary: Champ obligatoire manquant
                  description: Le champ `reference` ou `source_id` est absent du corps.
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveOffer401Error'
              examples:
                Error-InvalidToken:
                  value:
                    detail: Le jeton fourni n'est pas valide.
                    code: token_not_valid
                    messages:
                    - token_class: AccessToken
                      token_type: access
                      message: Token is invalid or expired
                  summary: Token JWT invalide ou expiré
                  description: Le token dans le header `Authorization` est invalide
                    ou expiré.
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveOfferNotFound'
              examples:
                Error-NotFound:
                  value:
                    detail: Not found.
                  summary: Offre introuvable
                  description: Aucune offre ne correspond à la référence fournie.
          description: ''
  /api/v1/offres/creer_modifier/:
    post:
      operationId: v1_offres_creer_modifier_create
      description: |2

        # API d'ingestion d'offres d'emploi de la Fonction Publique

        Cette API permet de créer ou mettre à jour, entre 1 et 100 offres d'emploi à la fois, via un payload JSON.

        - Les offres sont identifiées par leur champs `identification.reference` et `identification.source`.
        - Une offre existante est mise à jour, une offre inconnue est créée.

        # Permissions

        L'utilisation de cette API nécessite un token d'autorisation spécifique à chaque utilisateur.

        # Limitations

        L'interrogation de cette API est limitée à 120 appels par minute et par utilisateur.

        Le nombre d'offres transmises par appel à l'API est limité à 100.
      summary: Ajouter/mettre à jour une offre d'emploi
      tags:
      - offres
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertOffersRequest'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertOffersResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenError'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
          description: ''
components:
