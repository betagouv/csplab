services:
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: csp_postgresql
    env_file:
      - env.d/postgresql
    environment:
      # Avoid a log error when starting the itou_postgres container:
      # > Role "root" does not exist.
      # Without this variable, the default Unix account ('root')
      # is used automatically when starting postgres.
      # https://www.postgresql.org/docs/current/libpq-envars.html
      - PGUSER=postgres
      - PGPASSWORD=password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready"
        - "-d"
        - "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: csp_qdrant
    ports:
      - "6333:6333"
    expose:
      - 6333
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis
    container_name: csp_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local

configs:
  qdrant_config:
    content: |
      log_level: INFO
